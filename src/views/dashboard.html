<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Controle Uber</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-7xl mx-auto my-8 p-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Histórico de Performance</h1>
                <p class="text-gray-600">Acompanhamento consolidado do motorista</p>
            </div>
            <a href="nova-jornada.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow-md transition">
                + Fechar Novo Dia
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-5 rounded-lg shadow-md border-l-4 border-green-500">
                <span class="text-sm font-semibold text-gray-500 uppercase">Faturamento Bruto</span>
                <h3 id="cardFaturamento" class="text-2xl font-bold text-gray-800 mt-1">R$ 0,00</h3>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-md border-l-4 border-blue-500">
                <span class="text-sm font-semibold text-gray-500 uppercase">Quilometragem Rodada</span>
                <h3 id="cardKm" class="text-2xl font-bold text-gray-800 mt-1">0.0 KM</h3>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-md border-l-4 border-purple-500">
                <span class="text-sm font-semibold text-gray-500 uppercase">Total de Viagens</span>
                <h3 id="cardViagens" class="text-2xl font-bold text-gray-800 mt-1">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ganhos</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rodagem</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Viagens</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Combustível</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Consumo Web</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nota</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaDados" class="bg-white divide-y divide-gray-200 text-sm text-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        async function carregarDashboard() {
            try {
                const res = await fetch(`${API_URL}/dashboard`);
                const dados = await res.json();

                // Armazena temporariamente no sessionStorage para resgatar na tela de edição facilmente
                sessionStorage.setItem('jornadas', JSON.stringify(dados));

                let totalFaturamento = 0;
                let totalKm = 0;
                let totalViagens = 0;

                const tbody = document.getElementById('tabelaDados');
                tbody.innerHTML = '';

                if(dados.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-gray-500">Nenhum registro encontrado.</td></tr>`;
                    return;
                }

                dados.forEach(d => {
                    totalFaturamento += parseFloat(d.valor_recebido);
                    totalKm += parseFloat(d.km_rodados);
                    totalViagens += parseInt(d.qtd_viagens);

                    const dataFormatada = new Date(d.data).toLocaleDateString('pt-BR', {timeZone: 'UTC'});

                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 whitespace-nowrap font-medium">${dataFormatada}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-green-600 font-semibold">R$ ${parseFloat(d.valor_recebido).toFixed(2)}</td>
                            <td class="px-4 py-3 whitespace-nowrap">${parseFloat(d.km_rodados).toFixed(1)} KM</td>
                            <td class="px-4 py-3 whitespace-nowrap">${d.qtd_viagens}</td>
                            <td class="px-4 py-3 whitespace-nowrap"><span class="px-2 py-1 text-xs bg-gray-200 rounded">${d.combustivel}</span></td>
                            <td class="px-4 py-3 whitespace-nowrap">${parseFloat(d.consumo_internet_mb).toFixed(2)} MB</td>
                            <td class="px-4 py-3 whitespace-nowrap text-yellow-600 font-bold">⭐ ${d.nota_final_dia}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-center space-x-2">
                                <a href="nova-jornada.html?id=${d.id_dia}" class="text-blue-600 hover:text-blue-900 font-semibold">Editar</a>
                                <button onclick="deletarDia(${d.id_dia})" class="text-red-600 hover:text-red-900 font-semibold">Excluir</button>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('cardFaturamento').innerText = `R$ ${totalFaturamento.toFixed(2)}`;
                document.getElementById('cardKm').innerText = `${totalKm.toFixed(1)} KM`;
                document.getElementById('cardViagens').innerText = totalViagens;

            } catch (err) {
                console.error("Erro ao carregar dashboard", err);
            }
        }

        async function deletarDia(id) {
            if (confirm('Tem certeza absoluta que deseja excluir este dia de registro? Todos os dados financeiros e km associados serão apagados.')) {
                try {
                    const res = await fetch(`${API_URL}/jornada/${id}`, { method: 'DELETE' });
                    const resultado = await res.json();
                    
                    if (resultado.success) {
                        alert(resultado.message);
                        carregarDashboard(); // Recarrega a listagem
                    } else {
                        alert('Erro ao excluir: ' + resultado.error);
                    }
                } catch (err) {
                    alert('Erro de comunicação com o servidor.');
                }
            }
        }

        carregarDashboard();
    </script>
</body>
</html>
